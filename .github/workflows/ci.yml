name: Rack Designer CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Python compile check
        run: python -m compileall app1.py tests
      - name: Validate JSON files
        run: python -m json.tool equipment.json >/dev/null && python -m json.tool stencils.json >/dev/null && python -m json.tool stencils-rear.json >/dev/null
      - name: JavaScript syntax check
        run: npm run check:js
      - name: Run tests
        run: pytest -q
      - name: Bandit security scan
        run: bandit -q -r app1.py
